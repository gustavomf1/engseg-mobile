name: engseg_mobile
description: EngSeg SGS mobile app for field safety records.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.2
  intl: ^0.20.2
  # Offline storage
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0
  # Push notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  # Camera + GPS
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  # Connectivity
  connectivity_plus: ^6.1.1
  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
